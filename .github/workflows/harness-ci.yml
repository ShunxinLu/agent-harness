name: Harness CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall src tests scripts

      - name: Docs lint
        run: python scripts/lint_docs.py

      - name: Unit tests
        run: python -m pytest -q

  integration-tests:
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,integration]"

      - name: Run integration tests
        run: python -m pytest -q tests/integration -m integration
